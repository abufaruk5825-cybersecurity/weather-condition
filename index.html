<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Condition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <form class="myform">
    <input type="text" id="weather" placeholder="Enter city name">
    <button type="submit" id="btn">Get Weather</button>
    <p class="demo-hint"> Demo cities: Dessie, Kombolcha, Addis Ababa, Bahir Dar, London, Paris, Tokyo</p>
  </form>

  <p class="errorDisplay"></p>

  <div class="card">
    <h1 class="cityDisplay"></h1>
    <p class="temDisplay"></p>
    <p class="humidityDisplay"></p>
    <p class="descDisplay"></p>
    <p class="weatherEmoji"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
